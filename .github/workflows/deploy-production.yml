name: Deploy to Production

# 手動トリガーのみ（安定後に push トリガーへ移行可能）。
on:
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "デプロイまで実行する（false ならイメージの build/push のみ）"
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================================================
  # 1. イメージのビルドと ghcr.io への push（GitHub ホストランナー）
  # ============================================================================
  build-and-push:
    name: Build and Push App Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # 同一リポジトリのパッケージへの push は GITHUB_TOKEN で足りる（手動シークレット不要）。
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "timestamp=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/app:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/app:${{ steps.meta.outputs.timestamp }}
            ${{ env.REGISTRY }}/${{ github.repository }}/app:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## 🚀 Image pushed"
            echo ""
            echo "**Registry:** \`${{ env.REGISTRY }}/${{ github.repository }}/app\`"
            echo "**Tags:** \`latest\`, \`${{ steps.meta.outputs.timestamp }}\`, \`${{ steps.meta.outputs.sha_short }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # 2. 本番サーバーへデプロイ（self-hosted runner）
  # ============================================================================
  deploy:
    name: Deploy to Production Server
    needs: build-and-push
    if: ${{ inputs.run_deploy }}
    runs-on: self-hosted
    env:
      # private パッケージのとき deploy.sh が ghcr ログインに使う（public なら未設定で可）。
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
    steps:
      - name: Checkout deploy assets
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy/scripts
            deploy/prod

      - name: Setup .env from PRODUCTION_ENV
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          DEPLOY_DIR="$HOME/deploy/baseball-market-spring"
          mkdir -p "$DEPLOY_DIR"
          if [ -n "$PRODUCTION_ENV" ]; then
            echo "$PRODUCTION_ENV" | base64 -d > "$DEPLOY_DIR/.env"
            echo "✅ .env generated from PRODUCTION_ENV"
          elif [ -f "$DEPLOY_DIR/.env" ]; then
            echo "ℹ️ PRODUCTION_ENV not set. Using existing $DEPLOY_DIR/.env"
          else
            echo "❌ PRODUCTION_ENV not set and no existing .env"
            exit 1
          fi

      - name: Run deploy script
        run: |
          chmod +x deploy/scripts/deploy.sh
          ./deploy/scripts/deploy.sh

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Deployment ${{ job.status }}"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Triggered by:** ${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"

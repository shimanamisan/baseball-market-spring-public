name: Mirror to Public Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false  # デフォルトの GITHUB_TOKEN を git 設定に残さない

      - name: Remove sensitive / internal files
        run: |
          # このワークフロー自身は公開リポジトリには不要（公開側で再実行されると
          # PUBLIC_REPO_TOKEN が無いため必ず失敗し、ミラー運用情報も露出するため除外）
          rm -f .github/workflows/mirror-to-public.yml
          # 個人用ローカル設定（万一追跡されていた場合の保険）
          rm -f .claude/settings.local.json
          echo "*.local" >> .gitignore

      - name: Create README for public repo
        run: |
          cat > README-PUBLIC.md << 'EOF'
          # Baseball Market (Spring Boot)

          ## 概要
          野球グッズの個人間売買マーケットプレイスです。旧 `baseball-market`（PHP / DDD レイヤード）を **Spring Boot へフルリプレース**したアプリケーションで、ユーザー登録・出品・購入・掲示板でのやり取りまでの一連の取引フローを提供します。

          ## 主な機能
          - **ユーザー管理**: 会員登録、メール認証、ログイン、プロフィール編集、パスワードリマインド、退会
          - **商品出品 / 一覧 / 詳細**: 商品の出品・閲覧・売買履歴の管理
          - **購入フロー**: 掲示板（メッセージ）を介した出品者・購入者間の連絡と購入処理
          - **お気に入り（いいね）**: Ajax による非同期いいね機能
          - **マイページ**: 出品商品 / お気に入り / 参加中の掲示板を集約表示

          ## アーキテクチャ
          DDD（ドメイン駆動設計）の **Bounded Context × 4 レイヤー** 構成を採用しています。

          ```
          com.shimanamisan.baseballmarket.<context>/
          ├── domain          // エンティティ・Value Object(record)・Repository IF・ドメイン例外（Spring 非依存）
          ├── application     // ユースケース／サービス（@Service, @Transactional 境界）
          ├── infrastructure  // Repository 実装・外部 IO
          └── presentation    // Controller・Request/Response DTO
          ```

          - 依存方向: `presentation → application → domain ← infrastructure`
          - Bounded Context: `user` / `product` / `message` / `like` / `mypage` / `shared`
          - t-wada 流 TDD（Red-Green-Refactor）でテストファースト開発

          ## 技術スタック
          - Backend: Spring Boot 3.4.5 (Java 21) / Gradle
          - View: Thymeleaf
          - Persistence: Spring Data JPA / Flyway (MySQL 8.0)
          - Security: Spring Security
          - Mail: Spring Mail（開発環境は MailHog）
          - Dev Environment: Dev Container (Docker Compose)

          ## 注意事項
          このリポジトリは参照・学習目的で公開されています。

          ### プライベートリポジトリについて
          この公開リポジトリは、メインで運用されている**プライベートリポジトリのミラー**です。

          **プライベートリポジトリで運用している理由：**
          - **セキュリティ**: 環境設定・デプロイ設定・GitHub Actions のシークレット情報を保護するため
          - **本番環境の保護**: 実際のデプロイ先やサーバー情報などの機密情報を公開しないため
          - **ポートフォリオ展示**: コードの公開とセキュリティのバランスを取るため、公開用ミラーリポジトリを別途用意

          メインのプライベートリポジトリでは GitHub Actions によりこの公開リポジトリへ自動同期しています。`main` ブランチへの push をトリガーに、機密情報を除外した状態でミラーされます。

          ## ライセンス
          MIT License
          EOF

          mv README-PUBLIC.md README.md

      - name: Push to public repository
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          # Git 設定
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 既存の git 認証情報をクリア（念のため）
          git config --global --unset-all credential.helper || true
          git config --local --unset-all credential.helper || true

          # リモート追加
          git remote add public "https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/shimanamisan/baseball-market-spring-public.git"

          # コミット
          git add -A
          git commit -m "Mirror from private repo ($(date '+%Y-%m-%d %H:%M:%S'))" || echo "No changes to commit"

          # プッシュ
          git push public main --force

          echo "✅ Mirror completed successfully!"

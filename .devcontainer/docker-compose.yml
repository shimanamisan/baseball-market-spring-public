volumes:
  db-store:
    name: baseball-market-spring-db-store

networks:
  nginx-proxy-manager-network:
    external: true

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baseball-market-spring-app
    ports:
      - "8080:8080"
    environment:
      # 開発プロファイルを有効化。これにより application-dev.properties が読まれ、
      # 開発用シード（db/seed）が flyway.locations に追加される。
      # 本番デプロイは --spring.profiles.active=prod で起動するためこの値は渡らない。
      - SPRING_PROFILES_ACTIVE=dev
    volumes:
      - ../:/app
    depends_on:
      - db
      - mailhog
    networks:
      - nginx-proxy-manager-network

  mailhog:
    image: mailhog/mailhog
    container_name: baseball-market-spring-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - nginx-proxy-manager-network

  db:
    image: mysql:8.0
    container_name: baseball-market-spring-db
    environment:
      - MYSQL_DATABASE=bb_market
      - MYSQL_USER=bbuser
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
      - TZ=Asia/Tokyo
    volumes:
      - db-store:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - nginx-proxy-manager-network

spring.application.name=baseball-market-spring

# DataSource (devcontainer の docker-compose で起動する MySQL コンテナを参照)
# host はコンテナ名で一意に指定する。サービス名 `db` は旧 baseball-market プロジェクトの
# MySQL も同じ外部ネットワーク上で同名エイリアスを持つため、DNS が両者へ曖昧に解決され
# 接続先が非決定になる。コンテナ名なら spring 側 MySQL のみに解決される。
spring.datasource.url=jdbc:mysql://baseball-market-spring-db:3306/bb_market?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
spring.datasource.username=bbuser
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# Flyway がスキーマを管理するため、JPA の自動 DDL は無効化
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
# デフォルト（全プロファイル共通・本番含む）は db/migration のみ。安全側に倒す。
# 開発専用シード（db/seed・旧 baseball-market の本番相当データ）は dev プロファイル
# でのみ追加する（application-dev.properties）。dev プロファイルは devcontainer の
# SPRING_PROFILES_ACTIVE=dev で有効化される。これにより本番へ db/seed が物理的に
# 渡らないことを「設定」で担保する（コメント運用に依存しない）。
spring.flyway.locations=classpath:db/migration
# Flyway の ${...} 変数展開を無効化する。本プロジェクトは Flyway placeholder を使わず、
# 開発シード（db/seed）は旧本番のデータダンプで任意テキストに $ が含まれうるため、
# Flyway に変数展開させない（${...} を未定義 placeholder と誤認させない）。
spring.flyway.placeholder-replacement=false
# 既存DBに対して初回ベースラインを作成（旧 DB スキーマを流用するケースに備える）
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=existing-bb_market

# Mail (devcontainer の MailHog を参照)
spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# アプリ独自プロパティ
app.mail.from-address=itsup-info@shimanamisan.com
app.mail.from-name=Baseball Market
app.url=http://localhost:8080
# ランタイムのユーザーアップロード保存先（/uploads/** の配信元・WebConfig / ImageStorage の書込先）。
# 環境変数 APP_UPLOADS_PATH で上書き可能。既定はデプロイ成果物（jar）の外にある永続ディレクトリを指す
# （本番は外部ボリュームを APP_UPLOADS_PATH でマウントする想定）。dev は application-dev.properties で上書き。
app.uploads.path=${APP_UPLOADS_PATH:/var/lib/baseball-market/uploads}
# 開発用シード fixture 画像（/seed-images/**）は dev 限定の SeedImageWebConfig が配信する。
# パスは application-dev.properties の app.seed.images.path でのみ定義し、本番（@Profile("dev")
# 非該当）では Bean 自体がロードされないため、本番のデフォルト設定には定義不要。

# Session（旧 PHP の 1 時間タイムアウトを再現。remember-me 30 日は SecurityConfig 側で設定）
server.servlet.session.timeout=1h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Thymeleaf（開発時はキャッシュ無効）
spring.thymeleaf.cache=false

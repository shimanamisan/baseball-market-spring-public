spring.application.name=baseball-market-spring

# DataSource (devcontainer の docker-compose で起動する MySQL コンテナを参照)
spring.datasource.url=jdbc:mysql://db:3306/bb_market?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
spring.datasource.username=bbuser
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# Flyway がスキーマを管理するため、JPA の自動 DDL は無効化
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# 既存DBに対して初回ベースラインを作成（旧 DB スキーマを流用するケースに備える）
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=existing-bb_market

# Mail (devcontainer の MailHog を参照)
spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# アプリ独自プロパティ
app.mail.from-address=itsup-info@shimanamisan.com
app.mail.from-name=Baseball Market
app.url=http://localhost:8080
app.uploads.path=/app/app/src/main/resources/static/uploads

# Session（旧 PHP の 1 時間タイムアウトを再現。remember-me 30 日は SecurityConfig 側で設定）
server.servlet.session.timeout=1h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Thymeleaf（開発時はキャッシュ無効）
spring.thymeleaf.cache=false

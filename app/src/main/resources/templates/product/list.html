<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title th:text="|${siteTitle}｜ BASEBALL MARKET|">商品一覧</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Noto Sans JP', sans-serif;">
<header th:replace="~{shared/layout :: header}"></header>

<div th:if="${msgSuccess}" class="max-w-7xl mx-auto px-6 py-4">
  <div class="p-4 bg-green-50 border border-green-200 rounded-lg">
    <p class="text-green-800 text-sm font-medium" th:text="${msgSuccess}"></p>
  </div>
</div>

<main class="max-w-7xl mx-auto px-6 py-8">
  <form th:action="@{/}" method="get" class="bg-white p-4 rounded-lg shadow mb-6 grid grid-cols-1 md:grid-cols-4 gap-3">
    <select name="c_id" class="px-3 py-2 border rounded text-sm">
      <option value="0">カテゴリ：すべて</option>
      <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
              th:selected="${selectedCategory != null and selectedCategory == c.id}"></option>
    </select>
    <select name="m_id" class="px-3 py-2 border rounded text-sm">
      <option value="0">メーカー：すべて</option>
      <option th:each="m : ${makers}" th:value="${m.id}" th:text="${m.name}"
              th:selected="${selectedMaker != null and selectedMaker == m.id}"></option>
    </select>
    <select name="sort" class="px-3 py-2 border rounded text-sm">
      <option value="0">並び替え：新着順</option>
      <option value="1" th:selected="${selectedSort != null and selectedSort == 1}">価格が安い順</option>
      <option value="2" th:selected="${selectedSort != null and selectedSort == 2}">価格が高い順</option>
    </select>
    <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded font-bold">絞り込む</button>
  </form>

  <p class="text-sm text-gray-600 mb-4" th:text="|全 ${result.totalCount} 件 / ${result.currentPage} / ${result.totalPages > 0 ? result.totalPages : 1} ページ|"></p>

  <div th:if="${#lists.isEmpty(result.items)}" class="text-center py-16 text-gray-500">
    商品が見つかりませんでした
  </div>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    <a th:each="p : ${result.items}" th:href="@{|/productDetail/${p.id}|}"
       class="block bg-white rounded-xl shadow hover:shadow-lg transition">
      <div class="aspect-square bg-gray-100 overflow-hidden rounded-t-xl">
        <img th:if="${p.pic1 != null and !#strings.isEmpty(p.pic1)}" th:src="@{'/' + ${p.pic1}}"
             alt="" class="w-full h-full object-cover">
        <div th:unless="${p.pic1 != null and !#strings.isEmpty(p.pic1)}" class="flex items-center justify-center h-full text-gray-400">
          <i class="ri-image-line text-4xl"></i>
        </div>
      </div>
      <div class="p-3">
        <p class="text-sm font-semibold text-gray-900 line-clamp-2" th:text="${p.productName}"></p>
        <p class="text-base font-bold text-red-600 mt-1" th:text="|¥${#numbers.formatInteger(p.price, 1, 'COMMA')}|"></p>
        <p th:if="${p.soldOut}" class="text-xs text-white bg-gray-700 inline-block px-2 py-0.5 rounded mt-1">SOLD</p>
      </div>
    </a>
  </div>

  <nav th:if="${result.totalPages > 1}" class="flex justify-center gap-2 mt-8">
    <a th:each="i : ${#numbers.sequence(1, result.totalPages)}"
       th:href="@{/(p=${i}, c_id=${selectedCategory}, m_id=${selectedMaker}, sort=${selectedSort})}"
       th:text="${i}"
       th:class="${i == result.currentPage} ? 'px-3 py-1 bg-red-600 text-white rounded' : 'px-3 py-1 border rounded hover:bg-gray-100'"></a>
  </nav>
</main>

<footer th:replace="~{shared/layout :: footer}"></footer>
</body>
</html>

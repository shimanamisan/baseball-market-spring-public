<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8">
  <title th:text="|${siteTitle}｜ BASEBALL MARKET|">商品詳細</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Noto Sans JP', sans-serif;">
<header th:replace="~{shared/layout :: header}"></header>

<main class="max-w-5xl mx-auto px-6 py-8">
  <p th:if="${errorMessage}" th:text="${errorMessage}" role="alert"
     class="mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-800 text-sm rounded-lg"></p>

  <a th:href="@{/}" class="inline-flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-6 text-sm">
    <i class="ri-arrow-left-line"></i>一覧に戻る
  </a>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <div>
      <div class="aspect-square bg-gray-100 rounded-xl overflow-hidden mb-2">
        <img th:if="${product.pic1 != null and !#strings.isEmpty(product.pic1)}" th:src="@{'/' + ${product.pic1}}"
             alt="" class="w-full h-full object-cover">
      </div>
      <div class="grid grid-cols-3 gap-2">
        <img th:each="pic : ${ {product.pic2, product.pic3} }"
             th:if="${pic != null and !#strings.isEmpty(pic)}"
             th:src="@{'/' + ${pic}}" class="w-full aspect-square object-cover rounded">
      </div>
    </div>

    <div>
      <h1 class="text-2xl font-bold text-gray-900 mb-2" th:text="${product.productName}"></h1>
      <p th:if="${product.soldOut}" class="inline-block bg-gray-700 text-white text-xs px-2 py-0.5 rounded mb-2">SOLD</p>
      <p class="text-3xl font-bold text-red-600 mb-4" th:text="|¥${#numbers.formatInteger(product.price, 1, 'COMMA')}|"></p>

      <dl class="grid grid-cols-2 gap-y-2 text-sm text-gray-700 mb-6">
        <dt class="font-semibold">カテゴリ</dt>
        <dd th:text="${category?.name ?: '-'}"></dd>
        <dt class="font-semibold">メーカー</dt>
        <dd th:text="${maker?.name ?: '-'}"></dd>
      </dl>

      <p class="text-sm text-gray-800 whitespace-pre-wrap mb-6" th:text="${product.productComment}"></p>

      <div sec:authorize="isAuthenticated()">
        <form th:if="${!product.soldOut}" th:action="@{|/productDetail/${product.id}/purchase|}" method="post" class="mt-4">
          <button type="submit" onclick="return confirm('この商品を購入しますか？')"
                  class="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg">
            <i class="ri-shopping-cart-line mr-2"></i>購入する
          </button>
        </form>
      </div>
      <div sec:authorize="!isAuthenticated()" class="text-center mt-4">
        <a th:href="@{/login}" class="text-red-600 underline">ログインして購入</a>
      </div>
    </div>
  </div>
</main>

<footer th:replace="~{shared/layout :: footer}"></footer>
</body>
</html>

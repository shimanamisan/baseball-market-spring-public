<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>エラー｜ BASEBALL MARKET</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white shadow rounded-xl p-8">
    <h1 class="text-2xl font-bold text-red-600 mb-4">エラーが発生しました</h1>
    <p class="text-gray-700 mb-4" th:text="${message ?: 'エラーが発生しました'}">エラーが発生しました</p>
    <ul th:if="${errors}" class="text-sm text-red-600 list-disc pl-5">
      <li th:each="entry : ${errors}" th:text="${entry.value}"></li>
    </ul>
    <a th:href="@{/}" class="inline-block mt-6 px-4 py-2 bg-red-600 text-white rounded">トップへ戻る</a>
  </div>
</body>
</html>

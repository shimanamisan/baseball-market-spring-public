<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8">
  <title th:text="|${siteTitle}｜ BASEBALL MARKET|">連絡掲示板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50" style="font-family: 'Noto Sans JP', sans-serif;">
<header th:replace="~{shared/layout :: header}"></header>

<main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

  <p th:if="${msgSuccess}" th:text="${msgSuccess}" role="status"
     class="mb-4 px-4 py-3 bg-green-50 border border-green-200 text-green-800 text-sm rounded-lg"></p>

  <!-- ヘッダ: 取引相手 + 商品 -->
  <div class="bg-white rounded-2xl shadow p-4 sm:p-6 mb-6">
    <div class="flex flex-col sm:flex-row items-start gap-4 sm:gap-6">
      <div class="flex items-center gap-4 flex-1 min-w-0">
        <div class="w-14 h-14 rounded-full overflow-hidden bg-gray-100 border-2 border-red-500 flex-shrink-0">
          <img th:if="${partnerUser?.profile?.pic != null and !#strings.isEmpty(partnerUser.profile.pic)}"
               th:src="@{'/' + ${partnerUser.profile.pic}}" alt="相手のアバター" class="w-full h-full object-cover">
        </div>
        <div class="min-w-0 flex-1">
          <h2 class="font-bold text-gray-900 text-lg truncate"
              th:text="${partnerUser?.profile?.username ?: '名前無し'}">相手</h2>
          <p class="text-sm text-gray-600">
            <span th:if="${partnerUser?.profile?.age != null}" th:text="|${partnerUser.profile.age}歳|"></span>
            <span th:if="${partnerUser?.profile?.prefecture != null}" th:text="|・ ${partnerUser.profile.prefecture}|"></span>
          </p>
        </div>
      </div>
      <div th:if="${product != null}" class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl w-full sm:w-auto">
        <div class="w-16 h-16 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0">
          <img th:if="${product.pic1 != null and !#strings.isEmpty(product.pic1)}"
               th:src="@{'/' + ${product.pic1}}" alt="商品画像" class="w-full h-full object-cover">
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold text-gray-900 truncate" th:text="${product.productName}"></p>
          <p class="text-sm font-bold text-red-600"
             th:text="|¥${#numbers.formatInteger(product.price, 1, 'COMMA')}|"></p>
          <p class="text-xs text-gray-500"
             th:text="${#temporals.format(board.createdAt, 'yyyy/MM/dd')}"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- メッセージ一覧 + 送信フォーム -->
  <div class="bg-white rounded-2xl shadow overflow-hidden mb-6">
    <div id="js-scroll-bottom" class="h-[500px] overflow-y-auto bg-gradient-to-b from-gray-50 to-gray-100 p-4 sm:p-6 space-y-4">

      <div th:if="${#lists.isEmpty(messages)}" class="flex items-center justify-center h-full">
        <div class="text-center">
          <div class="w-16 h-16 flex items-center justify-center bg-gray-200 rounded-full mx-auto mb-4">
            <i class="ri-message-3-line text-3xl text-gray-400"></i>
          </div>
          <p class="text-gray-500 font-medium">メッセージ投稿はまだありません</p>
        </div>
      </div>

      <div th:each="m : ${messages}"
           th:with="mine=${m.fromUser == currentUserId}"
           class="flex" th:classappend="${mine} ? 'justify-end' : 'justify-start'">
        <div class="max-w-md flex items-end gap-2" th:classappend="${mine} ? 'flex-row-reverse' : ''">
          <div class="w-8 h-8 rounded-full overflow-hidden bg-gray-200 flex-shrink-0">
            <img th:with="pic=${mine} ? ${myUser?.profile?.pic} : ${partnerUser?.profile?.pic}"
                 th:if="${pic != null and !#strings.isEmpty(pic)}" th:src="@{'/' + ${pic}}"
                 alt="" class="w-full h-full object-cover">
          </div>
          <div>
            <div class="px-4 py-3 rounded-2xl"
                 th:classappend="${mine} ? 'bg-red-600 text-white rounded-tr-none' : 'bg-white text-gray-900 rounded-tl-none shadow-sm'">
              <p class="text-sm leading-relaxed whitespace-pre-wrap" th:text="${m.msg}"></p>
            </div>
            <p class="text-xs text-gray-500 mt-1" th:classappend="${mine} ? 'text-right' : 'text-left'"
               th:text="${#temporals.format(m.sendAt, 'HH:mm')}"></p>
          </div>
        </div>
      </div>
    </div>

    <p th:if="${errorMessage}" th:text="${errorMessage}" role="alert"
       class="px-4 sm:px-6 py-3 bg-red-50 border-t border-red-200 text-red-800 text-sm font-medium"></p>

    <div class="p-4 sm:p-6 border-t border-gray-200 bg-white">
      <form th:action="@{|/message/${board.id}/messages|}" method="post" class="flex items-end gap-2 sm:gap-3">
        <div class="flex-1 min-w-0">
          <label for="msg" class="sr-only">メッセージ</label>
          <textarea id="msg" name="msg" rows="2" placeholder="メッセージを入力..." aria-label="メッセージ"
            class="w-full px-3 py-2 sm:px-4 sm:py-3 border-2 border-gray-300 rounded-xl focus:border-red-600 focus:outline-none resize-none text-sm"
            th:text="${submittedMsg}"></textarea>
        </div>
        <button type="submit" aria-label="送信"
          class="px-4 py-2 sm:px-6 sm:py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl whitespace-nowrap h-fit flex-shrink-0">
          <i class="ri-send-plane-fill text-base sm:text-lg" aria-hidden="true"></i>
        </button>
      </form>
    </div>
  </div>

  <div class="text-center">
    <a th:href="@{/mypage}" class="text-gray-600 hover:text-gray-900 font-semibold text-sm inline-flex items-center gap-2">
      <i class="ri-arrow-left-line"></i>マイページに戻る
    </a>
  </div>
</main>

<footer th:replace="~{shared/layout :: footer}"></footer>

<script>
  window.addEventListener('DOMContentLoaded', function () {
    var box = document.getElementById('js-scroll-bottom');
    if (box) box.scrollTop = box.scrollHeight;
  });
</script>
</body>
</html>

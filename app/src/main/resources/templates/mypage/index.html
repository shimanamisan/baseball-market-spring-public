<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="|${siteTitle ?: 'マイページ'}｜ BASEBALL MARKET|">マイページ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen" style="font-family: 'Noto Sans JP', sans-serif;">
<header th:replace="~{shared/layout :: header}"></header>

<div th:if="${msgSuccess}" class="max-w-7xl mx-auto px-6 py-4">
  <div class="p-4 bg-green-50 border border-green-200 rounded-lg">
    <p class="text-green-800 text-sm font-medium" th:text="${msgSuccess}"></p>
  </div>
</div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-8">

  <!-- ユーザー情報 -->
  <section class="bg-white rounded-2xl shadow-lg p-4 sm:p-6 lg:p-8 mb-4 sm:mb-8">
    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-6">
      <div class="w-20 h-20 sm:w-24 sm:h-24 flex items-center justify-center bg-gradient-to-br from-red-500 to-red-600 rounded-full text-white text-2xl sm:text-3xl font-bold shadow-lg flex-shrink-0">
        <i class="ri-user-line"></i>
      </div>
      <div class="flex-1 w-full sm:w-auto">
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2">マイページ</h1>
        <div class="flex flex-wrap items-center gap-3 sm:gap-6">
          <div class="flex items-center gap-2">
            <i class="ri-shopping-bag-line text-red-600 text-lg sm:text-xl"></i>
            <span class="font-bold text-gray-900 text-sm sm:text-base"
                  th:text="${#lists.size(myPage.ownedProducts)}">0</span>
            <span class="text-gray-600 text-xs sm:text-sm">出品</span>
          </div>
          <div class="flex items-center gap-2">
            <i class="ri-heart-line text-red-600 text-lg sm:text-xl"></i>
            <span class="font-bold text-gray-900 text-sm sm:text-base"
                  th:text="${#lists.size(myPage.likedProducts)}">0</span>
            <span class="text-gray-600 text-xs sm:text-sm">お気に入り</span>
          </div>
        </div>
      </div>
      <div class="flex flex-row sm:flex-col gap-2 sm:gap-3 w-full sm:w-auto">
        <a th:href="@{/profEdit}" class="flex-1 sm:flex-none px-4 sm:px-6 py-2 sm:py-3 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors duration-200 whitespace-nowrap text-sm sm:text-base text-center">
          <i class="ri-edit-line mr-1 sm:mr-2"></i>プロフィール編集
        </a>
        <a th:href="@{/registProduct}" class="flex-1 sm:flex-none px-4 sm:px-6 py-2 sm:py-3 border-2 border-gray-300 hover:border-red-600 text-gray-700 hover:text-red-600 font-semibold rounded-lg transition-all duration-200 whitespace-nowrap text-sm sm:text-base text-center">
          <i class="ri-add-line mr-1 sm:mr-2"></i>出品する
        </a>
      </div>
    </div>
  </section>

  <!-- 出品商品一覧 -->
  <section class="bg-white rounded-2xl shadow-lg mb-4 sm:mb-8">
    <div class="p-4 sm:p-6 border-b border-gray-200">
      <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2">
        <i class="ri-store-line text-red-600"></i>登録商品一覧
      </h2>
    </div>
    <div class="p-4 sm:p-6">
      <div th:if="${#lists.isEmpty(myPage.ownedProducts)}" class="text-center py-12">
        <div class="w-16 h-16 flex items-center justify-center bg-gray-100 rounded-full mx-auto mb-4">
          <i class="ri-inbox-line text-3xl text-gray-400"></i>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-2">登録された商品はありません</h3>
        <a th:href="@{/registProduct}" class="inline-flex items-center gap-2 px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors duration-200 mt-4">
          <i class="ri-add-line"></i>商品を出品する
        </a>
      </div>
      <div th:unless="${#lists.isEmpty(myPage.ownedProducts)}"
           class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <a th:each="p : ${myPage.ownedProducts}" th:href="@{|/productDetail/${p.id}|}"
           class="bg-white rounded-xl border border-gray-200 hover:shadow-lg transition-all duration-200 overflow-hidden group">
          <div class="relative aspect-square w-full h-48 overflow-hidden bg-gray-100">
            <img th:if="${p.pic1 != null and !#strings.isEmpty(p.pic1)}" th:src="@{'/' + ${p.pic1}}"
                 th:alt="${p.productName}"
                 th:classappend="${p.soldOut} ? 'grayscale' : ''"
                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" loading="lazy">
            <div th:unless="${p.pic1 != null and !#strings.isEmpty(p.pic1)}"
                 class="flex items-center justify-center h-full text-gray-400">
              <i class="ri-image-line text-4xl"></i>
            </div>
            <div th:if="${p.soldOut}" class="absolute inset-0 bg-black/40 flex items-center justify-center">
              <div class="bg-gray-800 text-white px-4 py-2 rounded-full font-bold text-sm shadow-2xl">販売済み</div>
            </div>
          </div>
          <div class="p-4">
            <h3 class="font-bold text-gray-900 mb-2 line-clamp-2" th:text="${p.productName}"></h3>
            <p class="text-xl font-bold"
               th:classappend="${p.soldOut} ? 'text-gray-400' : 'text-red-600'"
               th:text="|¥${#numbers.formatInteger(p.price, 1, 'COMMA')}|"></p>
          </div>
        </a>
      </div>
    </div>
  </section>

  <!-- 連絡掲示板一覧 -->
  <section class="bg-white rounded-2xl shadow-lg mb-4 sm:mb-8">
    <div class="p-4 sm:p-6 border-b border-gray-200">
      <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2">
        <i class="ri-message-3-line text-red-600"></i>連絡掲示板一覧
      </h2>
    </div>
    <div class="p-4 sm:p-6">
      <div th:if="${#lists.isEmpty(myPage.boards)}" class="text-center py-12">
        <div class="w-16 h-16 flex items-center justify-center bg-gray-100 rounded-full mx-auto mb-4">
          <i class="ri-message-3-line text-3xl text-gray-400"></i>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-2">連絡掲示板はありません</h3>
      </div>
      <ul th:unless="${#lists.isEmpty(myPage.boards)}" class="space-y-4">
        <li th:each="b : ${myPage.boards}"
            class="flex flex-col sm:flex-row items-start gap-4 p-4 sm:p-6 border border-gray-200 rounded-xl hover:shadow-lg transition-all duration-200">
          <div class="flex-1 w-full">
            <h3 class="font-bold text-gray-900 mb-2"
                th:text="${b.productName ?: '（削除された商品）'}">商品名</h3>
            <div class="flex flex-wrap items-center gap-3 text-sm text-gray-600 mb-3">
              <span><i class="ri-user-3-line mr-1"></i>取引相手:
                <span th:text="${b.partnerUserId != null ? 'ユーザー#' + b.partnerUserId : '不明'}">相手</span>
              </span>
              <span th:if="${b.updatedAt != null}">
                <i class="ri-calendar-line mr-1"></i>
                <span th:text="${#temporals.format(b.updatedAt, 'yyyy/MM/dd HH:mm')}">日時</span>
              </span>
            </div>
            <a th:href="@{/message(b_id=${b.boardId})}"
               class="inline-flex items-center gap-2 px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors duration-200 text-sm">
              <i class="ri-chat-3-line"></i>掲示板へ
            </a>
          </div>
        </li>
      </ul>
    </div>
  </section>

  <!-- お気に入り商品一覧 -->
  <section class="bg-white rounded-2xl shadow-lg mb-4 sm:mb-8">
    <div class="p-4 sm:p-6 border-b border-gray-200">
      <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2">
        <i class="ri-heart-line text-red-600"></i>お気に入り商品一覧
      </h2>
    </div>
    <div class="p-4 sm:p-6">
      <div th:if="${#lists.isEmpty(myPage.likedProducts)}" class="text-center py-12">
        <div class="w-16 h-16 flex items-center justify-center bg-gray-100 rounded-full mx-auto mb-4">
          <i class="ri-heart-line text-3xl text-gray-400"></i>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-2">お気に入り登録された商品はありません</h3>
      </div>
      <div th:unless="${#lists.isEmpty(myPage.likedProducts)}"
           class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <a th:each="p : ${myPage.likedProducts}" th:href="@{|/productDetail/${p.id}|}"
           class="bg-white rounded-xl border border-gray-200 hover:shadow-lg transition-all duration-200 overflow-hidden group">
          <div class="relative aspect-square w-full h-48 overflow-hidden bg-gray-100">
            <img th:if="${p.pic1 != null and !#strings.isEmpty(p.pic1)}" th:src="@{'/' + ${p.pic1}}"
                 th:alt="${p.productName}"
                 th:classappend="${p.soldOut} ? 'grayscale' : ''"
                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" loading="lazy">
            <div th:unless="${p.pic1 != null and !#strings.isEmpty(p.pic1)}"
                 class="flex items-center justify-center h-full text-gray-400">
              <i class="ri-image-line text-4xl"></i>
            </div>
            <div th:if="${p.soldOut}" class="absolute inset-0 bg-black/40 flex items-center justify-center">
              <div class="bg-gray-800 text-white px-4 py-2 rounded-full font-bold text-sm shadow-2xl">販売済み</div>
            </div>
          </div>
          <div class="p-4">
            <h3 class="font-bold text-gray-900 mb-2 line-clamp-2" th:text="${p.productName}"></h3>
            <p class="text-xl font-bold"
               th:classappend="${p.soldOut} ? 'text-gray-400' : 'text-red-600'"
               th:text="|¥${#numbers.formatInteger(p.price, 1, 'COMMA')}|"></p>
          </div>
        </a>
      </div>
    </div>
  </section>

  <!-- クイックアクション -->
  <section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6">
    <a th:href="@{/registProduct}" class="bg-white rounded-xl shadow-lg p-4 sm:p-6 hover:shadow-xl transition-all duration-200 text-left group">
      <div class="w-12 h-12 flex items-center justify-center bg-red-100 rounded-full mb-3 group-hover:bg-red-600 transition-colors duration-200">
        <i class="ri-add-line text-xl text-red-600 group-hover:text-white"></i>
      </div>
      <h3 class="text-base font-bold text-gray-900 mb-1">商品を出品する</h3>
      <p class="text-xs text-gray-600">使わなくなった野球用品を出品</p>
    </a>
    <a th:href="@{/tranSale}" class="bg-white rounded-xl shadow-lg p-4 sm:p-6 hover:shadow-xl transition-all duration-200 text-left group">
      <div class="w-12 h-12 flex items-center justify-center bg-blue-100 rounded-full mb-3 group-hover:bg-blue-600 transition-colors duration-200">
        <i class="ri-file-list-line text-xl text-blue-600 group-hover:text-white"></i>
      </div>
      <h3 class="text-base font-bold text-gray-900 mb-1">販売履歴</h3>
      <p class="text-xs text-gray-600">過去の販売履歴を確認</p>
    </a>
    <a th:href="@{/passEdit}" class="bg-white rounded-xl shadow-lg p-4 sm:p-6 hover:shadow-xl transition-all duration-200 text-left group">
      <div class="w-12 h-12 flex items-center justify-center bg-yellow-100 rounded-full mb-3 group-hover:bg-yellow-600 transition-colors duration-200">
        <i class="ri-lock-line text-xl text-yellow-600 group-hover:text-white"></i>
      </div>
      <h3 class="text-base font-bold text-gray-900 mb-1">パスワード変更</h3>
      <p class="text-xs text-gray-600">セキュリティ設定の変更</p>
    </a>
    <a th:href="@{/withdraw}" class="bg-white rounded-xl shadow-lg p-4 sm:p-6 hover:shadow-xl transition-all duration-200 text-left group">
      <div class="w-12 h-12 flex items-center justify-center bg-gray-100 rounded-full mb-3 group-hover:bg-gray-600 transition-colors duration-200">
        <i class="ri-user-unfollow-line text-xl text-gray-600 group-hover:text-white"></i>
      </div>
      <h3 class="text-base font-bold text-gray-900 mb-1">退会</h3>
      <p class="text-xs text-gray-600">アカウントの削除</p>
    </a>
  </section>

</main>

<footer th:replace="~{shared/layout :: footer}"></footer>
</body>
</html>

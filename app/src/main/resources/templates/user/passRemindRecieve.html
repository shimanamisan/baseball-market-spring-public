<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title th:text="|${siteTitle}｜ BASEBALL MARKET|">認証キー入力</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Noto Sans JP', sans-serif;">
<header th:replace="~{shared/layout :: header}"></header>

<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">認証キー入力</h1>
        <p class="text-sm text-gray-600">メールに記載された認証キーを入力してください。</p>
      </div>

      <div th:if="${msgSuccess}" class="p-4 mb-4 bg-green-50 border border-green-200 rounded-lg">
        <p class="text-green-800 text-sm font-medium" th:text="${msgSuccess}"></p>
      </div>

      <form th:action="@{/passRemindRecieve}" method="post" class="space-y-4">
        <div th:if="${errors['common']}" class="p-4 bg-red-50 border border-red-200 rounded-lg">
          <p class="text-red-800 text-sm font-medium" th:text="${errors['common']}"></p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">認証キー</label>
          <p th:if="${errors['token']}" class="text-red-600 text-xs mb-1" th:text="${errors['token']}"></p>
          <input type="text" name="token" th:value="${token}"
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 text-sm tracking-widest text-center"
                 placeholder="認証キー">
        </div>

        <button type="submit" class="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg">
          <i class="ri-key-line mr-2"></i>パスワードを再発行
        </button>
      </form>
    </div>
    <div class="text-center mt-6">
      <a th:href="@{/passRemindSend}" class="text-gray-600 hover:text-gray-900 font-semibold text-sm">
        <i class="ri-arrow-left-line"></i> 認証キー送信に戻る
      </a>
    </div>
  </div>
</div>

<footer th:replace="~{shared/layout :: footer}"></footer>
</body>
</html>

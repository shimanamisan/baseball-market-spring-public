<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title th:text="|${siteTitle}｜ BASEBALL MARKET|">メールアドレス確認</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Noto Sans JP', sans-serif;">
<header th:replace="~{shared/layout :: header}"></header>

<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="text-center mb-8">
        <div th:if="${errors['common']}">
          <div class="w-16 h-16 flex items-center justify-center bg-red-100 rounded-full mx-auto mb-4">
            <i class="ri-error-warning-line text-3xl text-red-600"></i>
          </div>
          <h1 class="text-2xl font-bold text-gray-900 mb-2">確認に失敗しました</h1>
          <div class="p-4 bg-red-50 border border-red-200 rounded-lg mt-4">
            <p class="text-red-800 text-sm font-medium" th:text="${errors['common']}"></p>
          </div>
          <div class="mt-6">
            <a th:href="@{/emailVerifyResend}"
               class="block w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg">
              <i class="ri-mail-send-line mr-2"></i>確認メールを再送信
            </a>
          </div>
        </div>
        <div th:unless="${errors['common']}">
          <div class="w-16 h-16 flex items-center justify-center bg-green-100 rounded-full mx-auto mb-4">
            <i class="ri-check-line text-3xl text-green-600"></i>
          </div>
          <h1 class="text-2xl font-bold text-gray-900 mb-2">確認が完了しました</h1>
          <p class="text-sm text-gray-600">メールアドレスの確認が完了しました。ログインしてください。</p>
        </div>
      </div>
    </div>
    <div class="text-center mt-6">
      <a th:href="@{/login}" class="text-gray-600 hover:text-gray-900 font-semibold text-sm">
        <i class="ri-arrow-left-line"></i> ログインに戻る
      </a>
    </div>
  </div>
</div>

<footer th:replace="~{shared/layout :: footer}"></footer>
</body>
</html>

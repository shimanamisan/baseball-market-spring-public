<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title th:text="|${siteTitle}｜ BASEBALL MARKET|">新規登録</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Noto Sans JP', sans-serif;">
<header th:replace="~{shared/layout :: header}"></header>

<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="text-center mb-8">
        <div class="w-16 h-16 flex items-center justify-center bg-red-600 rounded-full mx-auto mb-4">
          <i class="ri-baseball-line text-3xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">BASEBALL MARKET</h1>
        <p class="text-gray-600">新規アカウント作成</p>
      </div>

      <form th:action="@{/signup}" th:object="${form}" method="post" class="space-y-4">
        <div th:if="${errors['common']}" class="p-4 bg-red-50 border border-red-200 rounded-lg">
          <p class="text-red-800 text-sm font-medium" th:text="${errors['common']}"></p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            メールアドレス <span class="text-red-600">*</span>
          </label>
          <p th:if="${errors['email']}" class="text-red-600 text-xs mb-1" th:text="${errors['email']}"></p>
          <input type="text" th:field="*{email}"
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 text-sm"
                 th:classappend="${errors['email'] != null} ? 'border-red-500' : ''"
                 placeholder="example@email.com">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            パスワード <span class="text-red-600">*</span>
            <span class="text-xs text-gray-500 ml-1">※英数字6文字以上</span>
          </label>
          <p th:if="${errors['password']}" class="text-red-600 text-xs mb-1" th:text="${errors['password']}"></p>
          <p th:if="${errors['pass']}" class="text-red-600 text-xs mb-1" th:text="${errors['pass']}"></p>
          <input type="password" th:field="*{password}"
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 text-sm"
                 th:classappend="${errors['password'] != null or errors['pass'] != null} ? 'border-red-500' : ''"
                 placeholder="••••••••">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            パスワード（再入力） <span class="text-red-600">*</span>
          </label>
          <p th:if="${errors['passwordConfirm']}" class="text-red-600 text-xs mb-1" th:text="${errors['passwordConfirm']}"></p>
          <input type="password" th:field="*{passwordConfirm}"
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 text-sm"
                 th:classappend="${errors['passwordConfirm'] != null} ? 'border-red-500' : ''"
                 placeholder="••••••••">
        </div>

        <button type="submit" class="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg">
          <i class="ri-user-add-line mr-2"></i>登録する
        </button>
      </form>

      <div class="text-center mt-6">
        <a th:href="@{/login}" class="text-gray-600 hover:text-gray-900 font-semibold text-sm">既にアカウントをお持ちの方はこちら</a>
      </div>
    </div>
  </div>
</div>

<footer th:replace="~{shared/layout :: footer}"></footer>
</body>
</html>

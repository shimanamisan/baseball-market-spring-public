<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title th:text="|${siteTitle}｜ BASEBALL MARKET|">ログイン</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Noto Sans JP', sans-serif;">
<header th:replace="~{shared/layout :: header}"></header>

<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="text-center mb-8">
        <div class="w-16 h-16 flex items-center justify-center bg-red-600 rounded-full mx-auto mb-4">
          <i class="ri-baseball-line text-3xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">BASEBALL MARKET</h1>
        <p class="text-gray-600">アカウントにログイン</p>
      </div>

      <div th:if="${msgSuccess}" class="p-4 mb-4 bg-green-50 border border-green-200 rounded-lg">
        <p class="text-green-800 text-sm font-medium" th:text="${msgSuccess}"></p>
      </div>

      <form th:action="@{/login}" method="post" class="space-y-4">
        <div th:if="${errorMessage}" class="p-4 bg-red-50 border border-red-200 rounded-lg">
          <p class="text-red-800 text-sm font-medium" th:text="${errorMessage}"></p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">メールアドレス</label>
          <input type="text" name="email"
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 text-sm"
                 placeholder="example@email.com">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">パスワード</label>
          <input type="password" name="password"
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 text-sm"
                 placeholder="••••••••">
        </div>

        <label class="flex items-center gap-2 text-sm text-gray-700">
          <input type="checkbox" name="remember-me" value="true" class="rounded border-gray-300">
          ログイン状態を保持する（30日）
        </label>

        <button type="submit" class="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg">
          <i class="ri-login-box-line mr-2"></i>ログイン
        </button>
      </form>

      <div class="mt-6 flex justify-between text-sm">
        <a th:href="@{/signup}" class="text-gray-600 hover:text-gray-900 font-semibold">新規登録はこちら</a>
        <a th:href="@{/passRemindSend}" class="text-red-600 hover:text-red-700 font-semibold">パスワードを忘れた</a>
      </div>
      <div class="mt-2 text-sm text-center">
        <a th:href="@{/emailVerifyResend}" class="text-gray-600 hover:text-gray-900">確認メールを再送信</a>
      </div>
    </div>
  </div>
</div>

<footer th:replace="~{shared/layout :: footer}"></footer>
</body>
</html>

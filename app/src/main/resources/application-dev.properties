# =====================================================================
# 開発（dev）プロファイル専用設定
#
# 有効化: SPRING_PROFILES_ACTIVE=dev（devcontainer の app サービスで設定）。
# このファイルはデフォルトの application.properties を「上書き／追加」する。
# 本番（prod）では読み込まれないため、ここに置いた設定は本番へ渡らない。
# =====================================================================

# 開発専用シード（旧 baseball-market の本番相当データ）を db/migration に加えて読む。
# 本番のデフォルト（db/migration のみ）を上書きするのは dev のときだけ。
# これにより、平文パスワードを持つ匿名化ユーザーや全テーブル DELETE を伴う
# repeatable シード（R__dev_seed_legacy_data.sql）が本番で走ることを防ぐ。
spring.flyway.locations=classpath:db/migration,classpath:db/seed

# =====================================================================
# 本番（prod）プロファイル専用設定
#
# 有効化: SPRING_PROFILES_ACTIVE=prod（本番コンテナの環境変数で設定）。
# このファイルはデフォルトの application.properties を「上書き／追加」する。
# 秘匿値はここに直書きせず、すべて環境変数（.env / PRODUCTION_ENV）から注入する。
# dev 専用設定（application-dev.properties）は読み込まれない。
# =====================================================================

# --- DataSource（実値は .env から注入） ---------------------------------
# host は旧 baseball-market の MySQL との alias 衝突を避けるためコンテナ名で固定する
# （DB_HOST=baseball-market-spring-db を想定）。
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / 本番トグル ---------------------------------------------------
# スキーマは Flyway が正。本番では SQL ログを出さず、OSIV を無効化する。
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- Thymeleaf（本番はテンプレートキャッシュ有効） -----------------------
spring.thymeleaf.cache=true

# --- Mail（実 SMTP・実値は .env から注入） -------------------------------
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- アプリ公開 URL -----------------------------------------------------
# メール認証リンクの生成元。必ず本番 https ドメインを .env の APP_URL で指定する。
app.url=${APP_URL}

# --- リバースプロキシ（NPM）配下での HTTPS 認識 + Secure Cookie ----------
# NPM が TLS を終端するため、X-Forwarded-* を信頼してスキームを判定する。
# これが無いと Secure Cookie・リダイレクト URL が http で壊れる。
server.forward-headers-strategy=native
server.servlet.session.cookie.secure=true

# --- Actuator（ヘルスチェック専用に最小公開） ---------------------------
# Docker / NPM / deploy.sh が /actuator/health で疎通確認する。health のみ公開。
management.endpoints.web.exposure.include=health
# 詳細（DB 名など）は無認証で漏らさない。UP/DOWN の集約ステータスのみ返す。
management.endpoint.health.show-details=never
# SMTP 到達性でコンテナのヘルスが揺れる（DOWN になる）のを防ぐため mail 健全性は除外。
# DB 健全性（= Flyway マイグレーション完了の確認）は有効のまま残す。
management.health.mail.enabled=false

# =====================================================================
# テスト専用設定（test classpath が main の application.properties を上書き）
# =====================================================================

# ランタイムアップロード先を OS の一時ディレクトリに固定する。
# ImageStorage はコンストラクタで app.uploads.path に createDirectories するため、
# 既定（/var/lib/baseball-market/uploads）のままだと dev プロファイル無しのテスト環境
# （CI・devcontainer 外）で書込権限が無く @SpringBootTest の context 生成が失敗する。
# テストでは環境非依存に書き込める tmpdir を使い、ファイル I/O への依存を最小化する。
app.uploads.path=${java.io.tmpdir}/baseball-market-test-uploads
